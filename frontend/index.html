<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Market Insights</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0A0A0A;
            --card-bg: #1A1A1A;
            --text: #E0E0E0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 80%;
            max-width: 1000px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 5px solid var(--gold);
        }
        h1 {
            color: var(--gold);
            font-size: 2.5em;
            margin-bottom: 20px;
            text-align: center;
        }
        .chart-placeholder {
            width: 100%;
            height: 400px;
            background: #252525;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            margin-top: 20px;
            border: 1px dashed var(--gold);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gold Market Dashboard</h1>
        <p>Theo dõi thị trường vàng thế giới với độ chính xác cao.</p>
        <div class="chart-placeholder">
            Biểu đồ nến sẽ được hiển thị ở đây
        </div>
    </div>
</body>
</html>
