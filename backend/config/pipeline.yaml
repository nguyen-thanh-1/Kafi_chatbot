router:
  huggingface_model: Qwen/Qwen3-4B-Instruct-2507
  quantization: 4bit
  max_new_tokens: 8
  temperature: 0.0
  # Optional override prompt. If omitted, defaults are used in code.
  # system_prompt: |
  #   ...
  # Cosine similarity threshold for cache hit
  routes:
    - FINANCIAL
    - KNOWLEDGE
    - GENERAL

guardrails:
  huggingface_model: Qwen/Qwen3Guard-Gen-0.6B
  quantization: 4bit
  max_new_tokens: 6
  temperature: 0.0
  # system_prompt: |
  #   ...

embeddings:
  huggingface_model:  Qwen/Qwen3-Embedding-4B #BAAI/bge-m3, Qwen/Qwen3-Embedding-0.6B
  normalize: true
  device: cpu #cuda

cache:
  enabled: true
  db_path: .cache/semantic_cache.sqlite
  similarity_threshold: 0.92
  response_similarity_threshold: 0.97
  max_entries: 5000
  top_k_scan: 2000

knowledge:
  enabled: true
  collection_name: "kafi_knowledge"
  qdrant_path: "data/qdrant_db"
  chunk_min: 400
  chunk_max: 800
  chunk_overlap: 50
  top_k_retrieve: 15

reranker:
  enabled: true
  huggingface_model: "Qwen/Qwen3-Reranker-0.6B"
  top_k: 3
  device: cuda # cuda

startup:
  preload_router: true
  preload_guardrails: true
  preload_embeddings: true
  preload_reranker: true
  preload_main_llm: true
